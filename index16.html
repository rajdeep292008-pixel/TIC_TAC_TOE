<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Grid: Tic-Tac-Toe</title>
    <style>
        :root { --bg: #050505; --neon-red: #ff003c; --neon-blue: #00f3ff; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        #game-container { background: var(--glass); backdrop-filter: blur(15px); padding: 2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; text-align: center; }
        #msg { font-size: 1.2rem; height: 2rem; margin: 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        #grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .cell { aspect-ratio: 1; border: 2px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 3rem; transition: 0.3s; }
        .cell:hover { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        .x { color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red); }
        .o { color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }
        .menu { display: flex; flex-direction: column; gap: 10px; }
        button { background: transparent; border: 1px solid var(--neon-blue); color: white; padding: 12px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--neon-blue); color: black; }
    </style>
</head>
<body>

<div id="game-container">
    <h2>CYBER-GRID</h2>
    <div id="msg">SELECT MODE</div>
    <div id="menu" class="menu">
        <button onclick="Game.setMode('PVP')">PLAYER VS PLAYER</button>
        <button onclick="Game.setMode('AI')">PLAYER VS COMPUTER</button>
    </div>
    <div id="grid" style="display:none;"></div>
    <button id="reset-btn" style="display:none;" onclick="Game.reset()">MAIN MENU</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const Game = {
        board: Array(9).fill(null),
        mode: null,
        turn: 'X',
        isGameOver: false,

        setMode(mode) {
            this.mode = mode;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('grid').style.display = 'grid';
            document.getElementById('reset-btn').style.display = 'block';
            this.init();
        },

        playSound(freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        },

        init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            this.board = Array(9).fill(null);
            this.isGameOver = false;
            this.turn = 'X';
            document.getElementById('msg').innerText = "RED'S TURN (X)";
            this.board.forEach((_, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => this.handleMove(i);
                grid.appendChild(cell);
            });
        },

        handleMove(i) {
            if (this.board[i] || this.isGameOver) return;
            this.board[i] = this.turn;
            this.playSound(this.turn === 'X' ? 440 : 220);
            this.updateUI();
            
            if (this.checkWinner()) return;
            
            this.turn = this.turn === 'X' ? 'O' : 'X';
            document.getElementById('msg').innerText = `${this.turn === 'X' ? 'RED' : 'BLUE'}'S TURN`;

            if (this.mode === 'AI' && this.turn === 'O') {
                this.isGameOver = true;
                setTimeout(() => this.aiMove(), 500);
            }
        },

        aiMove() {
            let move = this.getBestMove();
            this.board[move] = 'O';
            this.playSound(220);
            this.updateUI();
            if (!this.checkWinner()) {
                this.turn = 'X';
                this.isGameOver = false;
                document.getElementById('msg').innerText = "RED'S TURN (X)";
            }
        },

        getBestMove() {
            let bestScore = -Infinity, move;
            for (let i = 0; i < 9; i++) {
                if (!this.board[i]) {
                    this.board[i] = 'O';
                    let score = this.minimax(this.board, 0, false);
                    this.board[i] = null;
                    if (score > bestScore) { bestScore = score; move = i; }
                }
            }
            return move;
        },

        minimax(b, d, max) {
            let win = this.checkWinState();
            if (win === 'O') return 10 - d;
            if (win === 'X') return d - 10;
            if (!b.includes(null)) return 0;
            if (max) {
                let best = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (!b[i]) { b[i] = 'O'; best = Math.max(best, this.minimax(b, d + 1, false)); b[i] = null; }
                }
                return best;
            } else {
                let best = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (!b[i]) { b[i] = 'X'; best = Math.min(best, this.minimax(b, d + 1, true)); b[i] = null; }
                }
                return best;
            }
        },

        checkWinState() {
            const p = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let c of p) if (this.board[c[0]] && this.board[c[0]] === this.board[c[1]] && this.board[c[0]] === this.board[c[2]]) return this.board[c[0]];
            return null;
        },

        checkWinner() {
            const w = this.checkWinState();
            if (w) {
                document.getElementById('msg').innerText = w === 'X' ? "RED WINS!" : "BLUE WINS!";
                this.isGameOver = true;
                return true;
            }
            if (!this.board.includes(null)) {
                document.getElementById('msg').innerText = "DRAW MATCH!";
                this.isGameOver = true;
                return true;
            }
            return false;
        },

        updateUI() {
            const cells = document.querySelectorAll('.cell');
            this.board.forEach((v, i) => {
                cells[i].innerText = v || '';
                cells[i].className = `cell ${v ? v.toLowerCase() : ''}`;
            });
        },

        reset() {
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('grid').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'none';
            document.getElementById('msg').innerText = "SELECT MODE";
        }
    };
</script>
</body>
</html>
